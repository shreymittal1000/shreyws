# ShreyWS low-risk host hardening.
# Keep Docker and Tailscale forwarding behavior managed by their own services.

# Reduce kernel address and process-inspection information available to
# unprivileged local users.
kernel.kptr_restrict = 2
kernel.dmesg_restrict = 1
kernel.yama.ptrace_scope = 1

# Keep Debian's protected link/file defaults explicit and version controlled.
fs.protected_hardlinks = 1
fs.protected_symlinks = 1
fs.protected_fifos = 2
fs.protected_regular = 2
