# Template for a future owner-only agent pilot.
# This is intentionally not runnable as-is and must not be used for guest code.

services:
  owner_agent:
    image: registry.example.com/example/owner-agent:0.0.0
    container_name: shreyws-owner-agent-example
    restart: unless-stopped
    user: "1000:1000"
    read_only: true
    mem_limit: 2g
    cpus: "1.00"
    pids_limit: 256
    cap_drop:
      - ALL
    security_opt:
      - no-new-privileges:true
    networks:
      - owner_agent_frontend
      - owner_agent_backend
    environment:
      AGENT_BASE_PATH: /agent-example
      AGENT_COMMAND_EXECUTION: "disabled"
      AGENT_LAN_ACCESS: "disabled-by-policy"
    tmpfs:
      - /tmp:size=512m,noexec,nosuid,nodev
    volumes:
      - /srv/shreyws/infra/compose/owner-agent-example/config:/app/config:ro
      - /srv/shreyws/services/agents/owner/example:/workspace
      - /srv/shreyws/secrets/agents/owner/example:/run/secrets:ro
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://127.0.0.1:8080/-/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    labels:
      - traefik.enable=true
      - traefik.docker.network=owner_agent_frontend
      - traefik.http.routers.owner-agent-example.tls=true
      - traefik.http.routers.owner-agent-example.rule=Host(`shreyws.tail1591fa.ts.net`) && PathPrefix(`/agent-example`)
      - traefik.http.routers.owner-agent-example.entrypoints=websecure
      - traefik.http.routers.owner-agent-example.middlewares=authentik-forward-auth@docker
      - traefik.http.services.owner-agent-example.loadbalancer.server.port=8080
      - diun.enable=true
      - shreyws.trust_class=owner-trusted-agent
      - shreyws.workload=owner-agent-example
      - shreyws.owner=owner

networks:
  owner_agent_frontend:
    name: owner_agent_example_frontend
    external: true
  owner_agent_backend:
    name: owner_agent_example_backend
    internal: true
