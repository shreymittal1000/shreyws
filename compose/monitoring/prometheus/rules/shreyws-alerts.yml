groups:
  - name: shreyws-backups
    rules:
      - alert: BackupMetricsMissing
        expr: absent(shreyws_backup_last_success)
        for: 10m
        labels:
          severity: critical
        annotations:
          summary: "ShreyWS backup metrics are missing"
          description: "Node Exporter textfile metrics for Borg backup status are not present."

      - alert: BackupJobFailed
        expr: shreyws_backup_last_success == 0
        for: 20m
        labels:
          severity: critical
        annotations:
          summary: "ShreyWS Borg backup failed"
          description: "The latest Borg backup did not report success."

      - alert: BackupRepositoryCheckFailed
        expr: shreyws_backup_repository_check_success == 0
        for: 20m
        labels:
          severity: critical
        annotations:
          summary: "ShreyWS Borg repository check failed"
          description: "The repository-only consistency check from the latest backup did not report success."

      - alert: BackupVerifyDataFailed
        expr: shreyws_backup_verify_data_success == 0
        for: 1h
        labels:
          severity: critical
        annotations:
          summary: "ShreyWS Borg verify-data check failed"
          description: "The weekly Borg verify-data check has not reported success."

      - alert: BackupTooOld
        expr: shreyws_backup_age_seconds > 129600
        for: 30m
        labels:
          severity: critical
        annotations:
          summary: "ShreyWS backup is older than 36 hours"
          description: "The daily backup timer last reported success more than 36 hours ago."

      - alert: BackupCheckTooOld
        expr: shreyws_backup_check_age_seconds > 777600
        for: 1h
        labels:
          severity: warning
        annotations:
          summary: "ShreyWS backup verification is older than 9 days"
          description: "The weekly backup verification has not reported success within the expected window."

  - name: shreyws-storage
    rules:
      - alert: FilesystemUsageWarning
        expr: |
          (
            1 - (
              node_filesystem_avail_bytes{mountpoint=~"/|/srv", fstype!~"tmpfs|overlay|squashfs|vfat|iso9660"}
              /
              node_filesystem_size_bytes{mountpoint=~"/|/srv", fstype!~"tmpfs|overlay|squashfs|vfat|iso9660"}
            )
          ) > 0.80
          or
          shreyws_filesystem_usage_ratio{mountpoint="/srv/shreyws/backups"} > 0.80
        for: 30m
        labels:
          severity: warning
        annotations:
          summary: "Filesystem usage is above 80%"
          description: "{{ $labels.mountpoint }} is {{ humanizePercentage $value }} used."

      - alert: FilesystemUsageCritical
        expr: |
          (
            1 - (
              node_filesystem_avail_bytes{mountpoint=~"/|/srv", fstype!~"tmpfs|overlay|squashfs|vfat|iso9660"}
              /
              node_filesystem_size_bytes{mountpoint=~"/|/srv", fstype!~"tmpfs|overlay|squashfs|vfat|iso9660"}
            )
          ) > 0.90
          or
          shreyws_filesystem_usage_ratio{mountpoint="/srv/shreyws/backups"} > 0.90
        for: 10m
        labels:
          severity: critical
        annotations:
          summary: "Filesystem usage is above 90%"
          description: "{{ $labels.mountpoint }} is {{ humanizePercentage $value }} used."

      - alert: FilesystemMetricMissing
        expr: absent(shreyws_filesystem_usage_ratio{mountpoint="/srv/shreyws/backups"})
        for: 15m
        labels:
          severity: warning
        annotations:
          summary: "Expected ShreyWS filesystem metrics are missing"
          description: "The filesystem usage metric for /srv/shreyws/backups is missing."

      - alert: FilesystemInodesWarning
        expr: |
          (
            1 - (
              node_filesystem_files_free{mountpoint=~"/|/srv", fstype!~"tmpfs|overlay|squashfs|vfat|iso9660"}
              /
              node_filesystem_files{mountpoint=~"/|/srv", fstype!~"tmpfs|overlay|squashfs|vfat|iso9660"}
            )
          ) > 0.80
        for: 30m
        labels:
          severity: warning
        annotations:
          summary: "Filesystem inode usage is above 80%"
          description: "{{ $labels.mountpoint }} inode usage is {{ humanizePercentage $value }}. A filesystem can run out of inodes even when byte usage is acceptable."

      - alert: FilesystemInodesCritical
        expr: |
          (
            1 - (
              node_filesystem_files_free{mountpoint=~"/|/srv", fstype!~"tmpfs|overlay|squashfs|vfat|iso9660"}
              /
              node_filesystem_files{mountpoint=~"/|/srv", fstype!~"tmpfs|overlay|squashfs|vfat|iso9660"}
            )
          ) > 0.90
        for: 10m
        labels:
          severity: critical
        annotations:
          summary: "Filesystem inode usage is above 90%"
          description: "{{ $labels.mountpoint }} inode usage is {{ humanizePercentage $value }}. Create fewer files or free inodes before writes begin failing."

  - name: shreyws-smart
    rules:
      - alert: SmartMetricsMissing
        expr: absent(shreyws_smart_collection_timestamp_seconds)
        for: 20m
        labels:
          severity: critical
        annotations:
          summary: "SMART textfile metrics are missing"
          description: "Node Exporter is not exposing the ShreyWS SMART textfile metrics. Check shreyws-smart-metrics.timer and the textfile collector directory."

      - alert: SmartMetricsStale
        expr: time() - shreyws_smart_collection_timestamp_seconds > 3600
        for: 10m
        labels:
          severity: critical
        annotations:
          summary: "SMART textfile metrics are stale"
          description: "SMART metrics have not been updated for more than 1 hour. Check shreyws-smart-metrics.timer and journalctl -u shreyws-smart-metrics.service."

      - alert: SmartMetricsCollectionFailed
        expr: shreyws_smart_collection_success == 0
        for: 10m
        labels:
          severity: critical
        annotations:
          summary: "SMART collection failed for {{ $labels.role }} disk"
          description: "smartctl did not return parseable data for {{ $labels.device }} ({{ $labels.role }}). This is not reported as healthy; inspect device access and smartctl output."

      - alert: SmartDeviceMissing
        expr: shreyws_smart_device_present == 0
        for: 10m
        labels:
          severity: critical
        annotations:
          summary: "Configured SMART disk is missing"
          description: "{{ $labels.device }} ({{ $labels.role }}) is not present. Verify cabling, drive presence, and whether Linux device names changed."

      - alert: SmartUnsupported
        expr: shreyws_smart_supported == 0
        for: 30m
        labels:
          severity: warning
        annotations:
          summary: "SMART is unsupported for {{ $labels.role }} disk"
          description: "{{ $labels.device }} ({{ $labels.role }}) does not report SMART support. Disk health cannot be trusted from SMART metrics for this device."

      - alert: SmartHealthFailed
        expr: shreyws_smart_health_ok == 0 and shreyws_smart_collection_success == 1 and shreyws_smart_supported == 1
        for: 5m
        labels:
          severity: critical
        annotations:
          summary: "SMART overall health failed for {{ $labels.role }} disk"
          description: "{{ $labels.device }} ({{ $labels.role }}) reports failed overall SMART health. Back up important data and inspect the disk immediately."

      - alert: SmartAtaPendingSectors
        expr: shreyws_smart_ata_pending_sectors > 0
        for: 10m
        labels:
          severity: critical
        annotations:
          summary: "SMART pending sectors detected on {{ $labels.role }} disk"
          description: "{{ $labels.device }} ({{ $labels.role }}) reports {{ $value }} pending sector(s). Pending sectors indicate unreadable or unstable media."

      - alert: SmartAtaOfflineUncorrectableSectors
        expr: shreyws_smart_ata_offline_uncorrectable_sectors > 0
        for: 30m
        labels:
          severity: warning
        annotations:
          summary: "SMART offline uncorrectable sectors detected on {{ $labels.role }} disk"
          description: "{{ $labels.device }} ({{ $labels.role }}) reports {{ $value }} offline uncorrectable sector(s). A stable historical count is warning-level; increases are critical."

      - alert: SmartAtaOfflineUncorrectableSectorsIncreasing
        expr: increase(shreyws_smart_ata_offline_uncorrectable_sectors[24h]) > 0
        for: 10m
        labels:
          severity: critical
        annotations:
          summary: "SMART offline uncorrectable sectors are increasing on {{ $labels.role }} disk"
          description: "{{ $labels.device }} ({{ $labels.role }}) offline uncorrectable sector count increased in the last 24 hours. Plan disk replacement."

      - alert: SmartAtaReallocatedSectorsPresent
        expr: shreyws_smart_ata_reallocated_sectors > 0
        for: 1h
        labels:
          severity: warning
        annotations:
          summary: "SMART reallocated sectors present on {{ $labels.role }} disk"
          description: "{{ $labels.device }} ({{ $labels.role }}) reports {{ $value }} reallocated sector(s). A stable historical count is warning-level; increases are critical."

      - alert: SmartAtaReallocatedSectorsIncreasing
        expr: increase(shreyws_smart_ata_reallocated_sectors[24h]) > 0
        for: 10m
        labels:
          severity: critical
        annotations:
          summary: "SMART reallocated sectors are increasing on {{ $labels.role }} disk"
          description: "{{ $labels.device }} ({{ $labels.role }}) reallocated sector count increased in the last 24 hours. Plan disk replacement."

      - alert: SmartAtaReportedUncorrectableErrors
        expr: shreyws_smart_ata_reported_uncorrectable_errors > 0
        for: 30m
        labels:
          severity: warning
        annotations:
          summary: "SMART reported uncorrectable errors on {{ $labels.role }} disk"
          description: "{{ $labels.device }} ({{ $labels.role }}) reports {{ $value }} uncorrectable error(s). Inspect smartctl logs and watch for increases."

      - alert: SmartNvmeCriticalWarning
        expr: shreyws_smart_nvme_critical_warning > 0
        for: 5m
        labels:
          severity: critical
        annotations:
          summary: "NVMe critical SMART warning on {{ $labels.role }} disk"
          description: "{{ $labels.device }} ({{ $labels.role }}) reports NVMe critical warning bitmask {{ $value }}. Inspect the device immediately."

      - alert: SmartNvmeMediaErrors
        expr: shreyws_smart_nvme_media_errors > 0
        for: 30m
        labels:
          severity: warning
        annotations:
          summary: "NVMe media errors present on {{ $labels.role }} disk"
          description: "{{ $labels.device }} ({{ $labels.role }}) reports {{ $value }} NVMe media/data integrity error(s). A stable historical count is warning-level; increases are critical."

      - alert: SmartNvmeMediaErrorsIncreasing
        expr: increase(shreyws_smart_nvme_media_errors[24h]) > 0
        for: 10m
        labels:
          severity: critical
        annotations:
          summary: "NVMe media errors are increasing on {{ $labels.role }} disk"
          description: "{{ $labels.device }} ({{ $labels.role }}) NVMe media/data integrity errors increased in the last 24 hours. Plan disk replacement."

  - name: shreyws-host
    rules:
      - alert: HostHighCpuUsage
        expr: |
          1 - avg by (instance) (
            rate(node_cpu_seconds_total{mode="idle"}[5m])
          ) > 0.90
        for: 30m
        labels:
          severity: warning
        annotations:
          summary: "Host CPU usage is above 90%"
          description: "ShreyWS CPU usage has stayed above 90% for 30 minutes."

      - alert: HostHighLoadAverage
        expr: |
          node_load15
          /
          count by (instance, job) (node_cpu_seconds_total{mode="idle"})
          > 1.50
        for: 30m
        labels:
          severity: warning
        annotations:
          summary: "Host load average is high"
          description: "ShreyWS 15-minute load average is more than 1.5x the CPU count for 30 minutes."

      - alert: HostHighMemoryUsage
        expr: |
          1 - (
            node_memory_MemAvailable_bytes
            /
            node_memory_MemTotal_bytes
          ) > 0.90
        for: 30m
        labels:
          severity: warning
        annotations:
          summary: "Host memory usage is above 90%"
          description: "ShreyWS available memory has stayed below 10% for 30 minutes."

      - alert: HostCriticalMemoryUsage
        expr: |
          1 - (
            node_memory_MemAvailable_bytes
            /
            node_memory_MemTotal_bytes
          ) > 0.95
        for: 10m
        labels:
          severity: critical
        annotations:
          summary: "Host memory usage is above 95%"
          description: "ShreyWS available memory has stayed below 5% for 10 minutes."

  - name: shreyws-containers
    rules:
      - alert: ShreyWSContainerUnhealthy
        expr: container_health_state{container_label_diun_enable="true", name=~"shreyws-.+"} == 0
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "ShreyWS-managed container is unhealthy"
          description: "{{ $labels.name }} has reported Docker health status unhealthy for 5 minutes."

      - alert: ShreyWSContainerRestartLoop
        expr: changes(container_start_time_seconds{container_label_diun_enable="true", name=~"shreyws-.+"}[30m]) > 2
        for: 10m
        labels:
          severity: warning
        annotations:
          summary: "ShreyWS-managed container is restarting repeatedly"
          description: "{{ $labels.name }} restarted more than twice in 30 minutes."

      - alert: ShreyWSContainerUnexpectedlyDown
        expr: |
          absent(container_last_seen{name="shreyws-alert-log-webhook"})
          or absent(container_last_seen{name="shreyws-alertmanager"})
          or absent(container_last_seen{name="shreyws-authentik-postgresql"})
          or absent(container_last_seen{name="shreyws-authentik-proxy"})
          or absent(container_last_seen{name="shreyws-authentik-server"})
          or absent(container_last_seen{name="shreyws-authentik-worker"})
          or absent(container_last_seen{name="shreyws-backup-metrics"})
          or absent(container_last_seen{name="shreyws-cadvisor"})
          or absent(container_last_seen{name="shreyws-diun"})
          or absent(container_last_seen{name="shreyws-grafana"})
          or absent(container_last_seen{name="shreyws-homepage"})
          or absent(container_last_seen{name="shreyws-loki"})
          or absent(container_last_seen{name="shreyws-alloy"})
          or absent(container_last_seen{name="shreyws-node-exporter"})
          or absent(container_last_seen{name="shreyws-prometheus"})
          or absent(container_last_seen{name="shreyws-telegram-alert-webhook"})
          or absent(container_last_seen{name="shreyws-traefik"})
        for: 5m
        labels:
          severity: critical
        annotations:
          summary: "Expected ShreyWS container is not visible"
          description: "{{ $labels.name }} is not visible in cAdvisor metrics. It may be stopped, missing, or cAdvisor may be unable to see Docker containers."

      - alert: ShreyWSContainerOomEvent
        expr: increase(container_oom_events_total{container_label_diun_enable="true", name=~"shreyws-.+"}[15m]) > 0
        for: 5m
        labels:
          severity: critical
        annotations:
          summary: "ShreyWS-managed container had an OOM event"
          description: "{{ $labels.name }} reported an OOM event in the last 15 minutes. Check container logs and memory pressure."

      - alert: TelegramAlertWebhookUnavailable
        expr: absent(container_last_seen{name="shreyws-telegram-alert-webhook"})
        for: 5m
        labels:
          severity: critical
        annotations:
          summary: "Telegram alert webhook is unavailable"
          description: "The Telegram alert webhook container is not visible in cAdvisor metrics. Telegram notifications may not be delivered, but local JSONL logging should continue if Alertmanager is healthy."

  - name: shreyws-targets
    rules:
      - alert: HostMetricsMissing
        expr: up{job="node-exporter"} == 0
        for: 5m
        labels:
          severity: critical
        annotations:
          summary: "ShreyWS host metrics are missing"
          description: "Prometheus cannot scrape Node Exporter for 5 minutes."

      - alert: PrometheusTargetDown
        expr: up{job=~"prometheus|node-exporter|cadvisor|traefik|alertmanager|loki|alloy"} == 0
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "Prometheus target is down"
          description: "Prometheus target {{ $labels.job }} at {{ $labels.instance }} has been down for 5 minutes."

      - alert: AlertmanagerUnavailable
        expr: up{job="alertmanager"} == 0
        for: 5m
        labels:
          severity: critical
        annotations:
          summary: "Alertmanager is unavailable"
          description: "Prometheus cannot scrape Alertmanager at {{ $labels.instance }} for 5 minutes. Alerts may not be delivered until Alertmanager recovers."

      - alert: LokiUnavailable
        expr: up{job="loki"} == 0
        for: 5m
        labels:
          severity: critical
        annotations:
          summary: "Loki is unavailable"
          description: "Prometheus cannot scrape Loki at {{ $labels.instance }} for 5 minutes. Centralized log search may be unavailable."

      - alert: AlloyUnavailable
        expr: up{job="alloy"} == 0
        for: 5m
        labels:
          severity: critical
        annotations:
          summary: "Grafana Alloy is unavailable"
          description: "Prometheus cannot scrape Alloy at {{ $labels.instance }} for 5 minutes. Docker and journald logs may stop flowing to Loki."

      - alert: LokiDiscardingLogEntries
        expr: sum(rate(loki_discarded_samples_total[15m])) > 0
        for: 15m
        labels:
          severity: warning
        annotations:
          summary: "Loki is discarding log entries"
          description: "Loki has discarded log samples for 15 minutes. Check ingestion limits, line size limits, and Loki logs."

      - alert: AlloyDroppedLogEntries
        expr: sum(rate(loki_write_dropped_entries_total[15m])) > 0
        for: 15m
        labels:
          severity: warning
        annotations:
          summary: "Grafana Alloy is dropping log entries"
          description: "Alloy reports dropped log lines for 15 minutes. Check Alloy processing stages and Loki write errors."
