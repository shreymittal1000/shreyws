groups:
  - name: shreyws-backups
    rules:
      - alert: BackupMetricsMissing
        expr: absent(shreyws_backup_last_success)
        for: 10m
        labels:
          severity: critical
        annotations:
          summary: "ShreyWS backup metrics are missing"
          description: "Node Exporter textfile metrics for Borg backup status are not present."

      - alert: BackupJobFailed
        expr: shreyws_backup_last_success == 0
        for: 20m
        labels:
          severity: critical
        annotations:
          summary: "ShreyWS Borg backup failed"
          description: "The latest Borg backup did not report success."

      - alert: BackupRepositoryCheckFailed
        expr: shreyws_backup_repository_check_success == 0
        for: 20m
        labels:
          severity: critical
        annotations:
          summary: "ShreyWS Borg repository check failed"
          description: "The repository-only consistency check from the latest backup did not report success."

      - alert: BackupVerifyDataFailed
        expr: shreyws_backup_verify_data_success == 0
        for: 1h
        labels:
          severity: critical
        annotations:
          summary: "ShreyWS Borg verify-data check failed"
          description: "The weekly Borg verify-data check has not reported success."

      - alert: BackupTooOld
        expr: shreyws_backup_age_seconds > 129600
        for: 30m
        labels:
          severity: critical
        annotations:
          summary: "ShreyWS backup is older than 36 hours"
          description: "The daily backup timer last reported success more than 36 hours ago."

      - alert: BackupCheckTooOld
        expr: shreyws_backup_check_age_seconds > 777600
        for: 1h
        labels:
          severity: warning
        annotations:
          summary: "ShreyWS backup verification is older than 9 days"
          description: "The weekly backup verification has not reported success within the expected window."

  - name: shreyws-storage
    rules:
      - alert: FilesystemUsageWarning
        expr: |
          (
            1 - (
              node_filesystem_avail_bytes{mountpoint=~"/|/srv", fstype!~"tmpfs|overlay|squashfs|vfat|iso9660"}
              /
              node_filesystem_size_bytes{mountpoint=~"/|/srv", fstype!~"tmpfs|overlay|squashfs|vfat|iso9660"}
            )
          ) > 0.80
          or
          shreyws_filesystem_usage_ratio{mountpoint="/srv/shreyws/backups"} > 0.80
        for: 30m
        labels:
          severity: warning
        annotations:
          summary: "Filesystem usage is above 80%"
          description: "{{ $labels.mountpoint }} is {{ humanizePercentage $value }} used."

      - alert: FilesystemUsageCritical
        expr: |
          (
            1 - (
              node_filesystem_avail_bytes{mountpoint=~"/|/srv", fstype!~"tmpfs|overlay|squashfs|vfat|iso9660"}
              /
              node_filesystem_size_bytes{mountpoint=~"/|/srv", fstype!~"tmpfs|overlay|squashfs|vfat|iso9660"}
            )
          ) > 0.90
          or
          shreyws_filesystem_usage_ratio{mountpoint="/srv/shreyws/backups"} > 0.90
        for: 10m
        labels:
          severity: critical
        annotations:
          summary: "Filesystem usage is above 90%"
          description: "{{ $labels.mountpoint }} is {{ humanizePercentage $value }} used."

      - alert: FilesystemMetricMissing
        expr: absent(shreyws_filesystem_usage_ratio{mountpoint="/srv/shreyws/backups"})
        for: 15m
        labels:
          severity: warning
        annotations:
          summary: "Expected ShreyWS filesystem metrics are missing"
          description: "The filesystem usage metric for /srv/shreyws/backups is missing."

  - name: shreyws-containers
    rules:
      - alert: ShreyWSContainerUnhealthy
        expr: container_health_state{container_label_diun_enable="true", name=~"shreyws-.+"} == 0
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "ShreyWS-managed container is unhealthy"
          description: "{{ $labels.name }} has reported Docker health status unhealthy for 5 minutes."

      - alert: ShreyWSContainerRestartLoop
        expr: changes(container_start_time_seconds{container_label_diun_enable="true", name=~"shreyws-.+"}[30m]) > 2
        for: 10m
        labels:
          severity: warning
        annotations:
          summary: "ShreyWS-managed container is restarting repeatedly"
          description: "{{ $labels.name }} restarted more than twice in 30 minutes."

  - name: shreyws-targets
    rules:
      - alert: HostMetricsMissing
        expr: up{job="node-exporter"} == 0
        for: 5m
        labels:
          severity: critical
        annotations:
          summary: "ShreyWS host metrics are missing"
          description: "Prometheus cannot scrape Node Exporter for 5 minutes."

      - alert: PrometheusTargetDown
        expr: up{job=~"prometheus|node-exporter|cadvisor|traefik|alertmanager"} == 0
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "Prometheus target is down"
          description: "Prometheus target {{ $labels.job }} at {{ $labels.instance }} has been down for 5 minutes."
