global:
  scrape_interval: 15s
  evaluation_interval: 15s

alerting:
  alertmanagers:
    - static_configs:
        - targets: ["alertmanager:9093"]

rule_files:
  - /etc/prometheus/rules/*.yml

scrape_configs:
  - job_name: "prometheus"
    metrics_path: "/prometheus/metrics"
    static_configs:
      - targets: ["prometheus:9090"]

  - job_name: "node-exporter"
    static_configs:
      - targets: ["node-exporter:9100"]

  - job_name: "cadvisor"
    static_configs:
      - targets: ["cadvisor:8080"]

  - job_name: "traefik"
    static_configs:
      - targets: ["traefik:8082"]

  - job_name: "alertmanager"
    static_configs:
      - targets: ["alertmanager:9093"]

  - job_name: "loki"
    static_configs:
      - targets: ["loki:3100"]

  - job_name: "alloy"
    static_configs:
      - targets: ["alloy:12345"]

  - job_name: "pilot"
    metrics_path: "/metrics"
    static_configs:
      - targets: ["pilot:8000"]

  - job_name: "owner-agent"
    metrics_path: "/metrics"
    static_configs:
      - targets: ["owner-agent:8080"]
