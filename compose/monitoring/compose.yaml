services:
  prometheus:
    image: prom/prometheus:v3.13.0
    container_name: shreyws-prometheus
    restart: unless-stopped
    networks:
      - traefik_default
    volumes:
      - /srv/shreyws/infra/compose/monitoring/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - /srv/shreyws/infra/compose/monitoring/prometheus/rules:/etc/prometheus/rules:ro
      - /srv/shreyws/services/prometheus:/prometheus
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.path=/prometheus"
      - "--web.external-url=https://shreyws.tail1591fa.ts.net/prometheus/"
      - "--web.route-prefix=/prometheus"
    labels:
      - traefik.enable=true
      - traefik.docker.network=traefik_default
      - traefik.http.routers.prometheus.tls=true
      - traefik.http.routers.prometheus.rule=Host(`shreyws.tail1591fa.ts.net`) && PathPrefix(`/prometheus`)
      - traefik.http.routers.prometheus.entrypoints=websecure
      - traefik.http.routers.prometheus.middlewares=authentik-forward-auth@docker
      - traefik.http.services.prometheus.loadbalancer.server.port=9090
      - diun.enable=true

  node-exporter:
    image: prom/node-exporter:v1.11.1
    container_name: shreyws-node-exporter
    restart: unless-stopped
    pid: host
    networks:
      - traefik_default
    command:
      - "--path.rootfs=/host"
      - "--collector.textfile.directory=/textfile"
    volumes:
      - /:/host:ro,rslave
      - /srv/shreyws/services/node-exporter/textfile:/textfile:ro
    labels:
      - diun.enable=true

  backup-metrics:
    image: alpine:3.20
    container_name: shreyws-backup-metrics
    restart: unless-stopped
    networks:
      - traefik_default
    command: ["/bin/sh", "/usr/local/bin/backup-metrics.sh"]
    volumes:
      - /srv/shreyws/infra/compose/monitoring/backup-metrics/backup-metrics.sh:/usr/local/bin/backup-metrics.sh:ro
      - /var/log/shreyws-backup:/logs:ro
      - /run:/host/run:ro
      - /srv/shreyws/services/node-exporter/textfile:/textfile
    labels:
      - diun.enable=true

  cadvisor:
    image: gcr.io/cadvisor/cadvisor:latest
    container_name: shreyws-cadvisor
    restart: unless-stopped
    networks:
      - traefik_default
    volumes:
      - /:/rootfs:ro
      - /var/run:/var/run:ro
      - /sys:/sys:ro
      - /var/lib/docker:/var/lib/docker:ro
    labels:
      - "traefik.enable=true"
      - "traefik.docker.network=traefik_default"
      - "traefik.http.routers.cadvisor-root.rule=Host(`shreyws.tail1591fa.ts.net`) && Path(`/cadvisor`)"
      - "traefik.http.routers.cadvisor-root.entrypoints=websecure"
      - "traefik.http.routers.cadvisor-root.tls=true"
      - "traefik.http.routers.cadvisor-root.service=cadvisor"
      - "traefik.http.routers.cadvisor-root.middlewares=authentik-forward-auth@docker"

      - "traefik.http.routers.cadvisor-containers.rule=Host(`shreyws.tail1591fa.ts.net`) && PathPrefix(`/containers`)"
      - "traefik.http.routers.cadvisor-containers.entrypoints=websecure"
      - "traefik.http.routers.cadvisor-containers.tls=true"
      - "traefik.http.routers.cadvisor-containers.service=cadvisor"
      - "traefik.http.routers.cadvisor-containers.middlewares=authentik-forward-auth@docker"

      - "traefik.http.routers.cadvisor-static.rule=Host(`shreyws.tail1591fa.ts.net`) && PathPrefix(`/static`)"
      - "traefik.http.routers.cadvisor-static.entrypoints=websecure"
      - "traefik.http.routers.cadvisor-static.tls=true"
      - "traefik.http.routers.cadvisor-static.service=cadvisor"
      - "traefik.http.routers.cadvisor-static.middlewares=authentik-forward-auth@docker"

      - "traefik.http.services.cadvisor.loadbalancer.server.port=8080"

      - "traefik.http.routers.cadvisor-docker.rule=Host(`shreyws.tail1591fa.ts.net`) && PathPrefix(`/docker`)"
      - "traefik.http.routers.cadvisor-docker.entrypoints=websecure"
      - "traefik.http.routers.cadvisor-docker.tls=true"
      - "traefik.http.routers.cadvisor-docker.service=cadvisor"
      - "traefik.http.routers.cadvisor-docker.middlewares=authentik-forward-auth@docker"

      - "traefik.http.routers.cadvisor-podman.rule=Host(`shreyws.tail1591fa.ts.net`) && PathPrefix(`/podman`)"
      - "traefik.http.routers.cadvisor-podman.entrypoints=websecure"
      - "traefik.http.routers.cadvisor-podman.tls=true"
      - "traefik.http.routers.cadvisor-podman.service=cadvisor"
      - "traefik.http.routers.cadvisor-podman.middlewares=authentik-forward-auth@docker"
      - "diun.enable=true"

networks:
  traefik_default:
    external: true
