services:
  prometheus:
    image: prom/prometheus:latest
    container_name: shreyws-prometheus
    restart: unless-stopped
    ports:
      - "9090:9090"
    volumes:
      - /srv/shreyws/compose/monitoring/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - /srv/shreyws/services/prometheus:/prometheus
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.path=/prometheus"

  grafana:
    image: grafana/grafana:latest
    container_name: shreyws-grafana
    restart: unless-stopped
    ports:
      - "3000:3000"
    volumes:
      - /srv/shreyws/services/grafana:/var/lib/grafana
    depends_on:
      - prometheus

  node-exporter:
    image: prom/node-exporter:latest
    container_name: shreyws-node-exporter
    restart: unless-stopped
    pid: host
    ports:
      - "9100:9100"
    command:
      - "--path.rootfs=/host"
    volumes:
      - /:/host:ro,rslave

  cadvisor:
    image: gcr.io/cadvisor/cadvisor:latest
    container_name: shreyws-cadvisor
    restart: unless-stopped
    ports:
      - "8080:8080"
    volumes:
      - /:/rootfs:ro
      - /var/run:/var/run:ro
      - /sys:/sys:ro
      - /var/lib/docker:/var/lib/docker:ro
