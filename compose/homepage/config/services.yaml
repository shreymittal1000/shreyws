- Infrastructure:
    - Traefik:
        icon: traefik.png
        href: https://shreyws.tail1591fa.ts.net/prometheus/graph?g0.expr=traefik_config_last_reload_success
        description: Reverse proxy and HTTPS entrypoint
        siteMonitor: http://traefik:8082/metrics
        widget:
          type: prometheusmetric
          url: http://prometheus:9090/prometheus
          refreshInterval: 30000
          metrics:
            - label: Requests
              query: sum(rate(traefik_entrypoint_requests_total[5m]))
              format:
                type: number
                suffix: /s
                options:
                  maximumFractionDigits: 2
            - label: Open
              query: sum(traefik_open_connections)
              format:
                type: number
                options:
                  maximumFractionDigits: 0
    - Grafana:
        icon: grafana.png
        href: https://shreyws.tail1591fa.ts.net/grafana/d/shreyws-overview/shreyws-overview
        description: Dashboards and observability
        siteMonitor: http://grafana:3000/grafana/login
    - Prometheus:
        icon: prometheus.png
        href: https://shreyws.tail1591fa.ts.net/prometheus/
        description: Metrics and alert rules
        siteMonitor: http://prometheus:9090/prometheus/-/ready
        widget:
          type: prometheus
          url: http://prometheus:9090/prometheus
          fields: ["targets_up", "targets_down", "targets_total"]
    - cAdvisor:
        icon: cadvisor.png
        href: https://shreyws.tail1591fa.ts.net/docker/
        description: Container resource metrics
        siteMonitor: http://cadvisor:8080/containers/
        widget:
          type: prometheusmetric
          url: http://prometheus:9090/prometheus
          refreshInterval: 30000
          metrics:
            - label: Containers
              query: count(container_last_seen{name!=""})
              format:
                type: number
                options:
                  maximumFractionDigits: 0
    - Node Exporter:
        icon: prometheus.png
        href: https://shreyws.tail1591fa.ts.net/prometheus/targets?search=node-exporter
        description: Host metrics exporter
        widget:
          type: prometheusmetric
          url: http://prometheus:9090/prometheus
          refreshInterval: 30000
          metrics:
            - label: Uptime
              query: time() - node_boot_time_seconds{job="node-exporter"}
              format:
                type: duration
            - label: Filesystem
              query: max(1 - (node_filesystem_avail_bytes{job="node-exporter",fstype!~"tmpfs|overlay|squashfs"} / node_filesystem_size_bytes{job="node-exporter",fstype!~"tmpfs|overlay|squashfs"}))
              format:
                type: percent
                options:
                  maximumFractionDigits: 0

- Operations:
    - Backup Status:
        icon: mdi-database-clock
        href: https://shreyws.tail1591fa.ts.net/grafana/d/shreyws-overview/shreyws-overview?viewPanel=24
        description: Borg backup freshness and check status
        widget:
          type: prometheusmetric
          url: http://prometheus:9090/prometheus
          refreshInterval: 30000
          metrics:
            - label: Age
              query: shreyws_backup_age_seconds
              format:
                type: duration
            - label: Last OK
              query: shreyws_backup_last_success
              format:
                type: number
                options:
                  maximumFractionDigits: 0
            - label: Check OK
              query: shreyws_backup_repository_check_success
              format:
                type: number
                options:
                  maximumFractionDigits: 0
    - Docker:
        icon: docker.png
        href: https://shreyws.tail1591fa.ts.net/docker/
        description: Container inventory through cAdvisor
        widget:
          type: prometheusmetric
          url: http://prometheus:9090/prometheus
          refreshInterval: 30000
          metrics:
            - label: Running
              query: count(time() - container_last_seen{name!=""} < 60)
              format:
                type: number
                options:
                  maximumFractionDigits: 0
            - label: Restarts
              query: sum(changes(container_start_time_seconds{name!=""}[30m]))
              format:
                type: number
                options:
                  maximumFractionDigits: 0
    - System Health:
        icon: mdi-server
        href: https://shreyws.tail1591fa.ts.net/grafana/d/shreyws-overview/shreyws-overview
        description: Host health summary from Prometheus
        widget:
          type: prometheusmetric
          url: http://prometheus:9090/prometheus
          refreshInterval: 30000
          metrics:
            - label: Down Targets
              query: count(up == 0)
              format:
                type: number
                options:
                  maximumFractionDigits: 0
            - label: Memory
              query: 1 - (node_memory_MemAvailable_bytes / node_memory_MemTotal_bytes)
              format:
                type: percent
                options:
                  maximumFractionDigits: 0
            - label: CPU
              query: 1 - avg(rate(node_cpu_seconds_total{mode="idle"}[5m]))
              format:
                type: percent
                options:
                  maximumFractionDigits: 0

